name: Sync Upstream

on:
  schedule:
    - cron: '0 0 * * *' # 每天 UTC 0:00
  workflow_dispatch:       # 手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout fork
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream
        run: git remote add upstream https://github.com/felipecrs/volume-locker.git

      - name: Fetch upstream
        run: |
          git fetch upstream master
          git fetch upstream --tags

      - name: Merge upstream
        id: merge
        run: |
          if git merge upstream/master --no-edit; then
            echo "merged=true" >> "$GITHUB_OUTPUT"
          else
            echo "merged=false" >> "$GITHUB_OUTPUT"
          fi
        continue-on-error: true

      - name: Push merged changes
        if: steps.merge.outputs.merged == 'true'
        run: git push origin master

      - name: Auto-tag and release
        if: steps.merge.outputs.merged == 'true'
        run: |
          LATEST=$(git ls-remote --tags upstream 'refs/tags/v[0-9]*' \
            | sed 's|.*refs/tags/||' \
            | sort -V \
            | tail -1)
          if [ -z "$LATEST" ]; then
            echo "No upstream version tags found, skipping"
            exit 0
          fi
          ZH_TAG="${LATEST}-zh"
          if git ls-remote --tags origin "refs/tags/${ZH_TAG}" | grep -q .; then
            echo "Tag ${ZH_TAG} already exists, skipping"
          else
            echo "Creating tag ${ZH_TAG} from upstream ${LATEST}"
            git tag "${ZH_TAG}"
            git push origin "${ZH_TAG}"
          fi

      - name: Create PR for conflicts
        if: steps.merge.outputs.merged == 'false'
        uses: peter-evans/create-pull-request@v7
        with:
          title: "🔄 同步上游更新 (有冲突需手动处理)"
          body: |
            上游仓库 [felipecrs/volume-locker](https://github.com/felipecrs/volume-locker) 有新的提交。

            **自动合并失败**，存在冲突需要手动解决。请 `git checkout upstream-sync` 并解决冲突后合并。
          branch: upstream-sync
          base: master
